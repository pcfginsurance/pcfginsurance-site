<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - PCFG Insurance Services</title>
  <link rel="stylesheet" href="/fonts.css">
  <style>
    body {
      font-family: 'Open Sans', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #f0f9ff 0%, #ffffff 100%);
      color: #212121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    
    .logo {
      max-width: 200px;
      margin-bottom: 2rem;
    }
    
    .success-icon {
      width: 80px;
      height: 80px;
      background: #4CAF50;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
    }
    
    h1 {
      font-family: 'Poppins', system-ui, sans-serif;
      font-size: 2.5rem;
      color: #212121;
      margin-bottom: 1rem;
      font-weight: 700;
    }
    
    p {
      font-size: 1.25rem;
      color: #666;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    
    .cta-buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }
    
    .btn {
      display: inline-block;
      padding: 1rem 2rem;
      border-radius: 0.5rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
      border: 2px solid transparent;
    }
    
    .btn-primary {
      background: #4CAF50;
      color: white;
    }
    
    .btn-primary:hover {
      background: #2E7D32;
    }
    
    .btn-secondary {
      background: transparent;
      color: #4CAF50;
      border-color: #4CAF50;
    }
    
    .btn-secondary:hover {
      background: #4CAF50;
      color: white;
    }
    
    .contact-info {
      background: white;
      padding: 2rem;
      border-radius: 0.5rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      margin-top: 3rem;
      max-width: 500px;
      width: 100%;
    }
    
    .contact-item {
      display: flex;
      align-items: center;
      margin-bottom: 1rem;
      padding: 0.75rem;
      background: #f8f9fa;
      border-radius: 0.375rem;
    }
    
    .contact-item:last-child {
      margin-bottom: 0;
    }
    
    .contact-icon {
      width: 24px;
      height: 24px;
      margin-right: 1rem;
      color: #4CAF50;
    }
    
    @media (min-width: 640px) {
      .cta-buttons {
        flex-direction: row;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/assets/PCFG-Insurance-Logo-Main.png" alt="PCFG Insurance Services" class="logo">
    
    <div class="success-icon">
      <svg width="40" height="40" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
      </svg>
    </div>
    
    <h1>Thank You!</h1>
    <p>Your form has been submitted successfully. Our team will review your information and contact you within 24 hours.</p>
    
    <div class="cta-buttons">
      <a href="/" class="btn btn-primary">Return to Home</a>
      <a href="/services" class="btn btn-secondary">View Our Services</a>
    </div>
    
    <div class="contact-info">
      <h3 style="margin-top: 0; color: #212121; font-family: 'Poppins', system-ui, sans-serif;">Need Immediate Assistance?</h3>
      
      <div class="contact-item">
        <svg class="contact-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
        </svg>
        <div>
          <strong>Call Us:</strong> (877) 717-7234
        </div>
      </div>
      
      <div class="contact-item">
        <svg class="contact-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 002 2z"></path>
        </svg>
        <div>
          <strong>Email Us:</strong> info@pcfginsurance.com
        </div>
      </div>
      
      <div class="contact-item">
        <svg class="contact-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <div>
          <strong>Hours:</strong> Mon-Fri 8AM-5PM
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // Auto-redirect after 10 seconds
    setTimeout(() => {
      window.location.href = '/';
    }, 10000);
    
    // Show countdown
    let countdown = 10;
    const countdownInterval = setInterval(() => {
      countdown--;
      if (countdown <= 0) {
        clearInterval(countdownInterval);
      }
    }, 1000);
  </script>
</body>
</html>
