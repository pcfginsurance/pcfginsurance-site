[build]
base = "."
command = "npx astro build"
publish = "dist"

[build.environment]
NODE_VERSION = "18"

[build.processing]
skip_processing = false

[build.processing.css]
bundle = true
minify = true

[build.processing.js]
bundle = true
minify = true

[build.processing.html]
pretty_urls = true

[build.processing.images]
compress = true

[[forms]]
name = "quick-quote"

[[forms]]
name = "contact"

[[forms]]
name = "commercial-auto-quote"

[[forms]]
name = "workers-comp-quote"

[[forms]]
name = "general-liability-quote"

[[forms]]
name = "bop-quote"

[[forms]]
name = "personal-lines-quote"

[[forms]]
name = "claim-report"

[[forms]]
name = "career-application"

[[headers]]
for = "/*.html"

[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"
X-Frame-Options = "SAMEORIGIN"
X-XSS-Protection = "1; mode=block"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/"

[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"
X-Frame-Options = "SAMEORIGIN"
X-XSS-Protection = "1; mode=block"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "SAMEORIGIN"
X-XSS-Protection = "1; mode=block"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Content-Security-Policy = "default-src 'self'; frame-src 'self' https://link.spartan-crm.com https://*.spartan-crm.com https://api.leadconnectorhq.com https://*.leadconnectorhq.com https://beta.leadconnectorhq.com https://link.msgsndr.com https://*.msgsndr.com https://reputationhub.site; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://link.spartan-crm.com https://link.msgsndr.com https://beta.leadconnectorhq.com https://www.googletagmanager.com https://s.adroll.com https://cdn.pagesense.io https://identity.netlify.com https://r2d2-inbound-js-store-production.s3.us-east-1.amazonaws.com https://reputationhub.site; connect-src 'self' https://beta.leadconnectorhq.com https://*.leadconnectorhq.com https://api.leadconnectorhq.com https://*.msgsndr.com; style-src 'self' 'unsafe-inline' https://beta.leadconnectorhq.com https://*.leadconnectorhq.com https://reputationhub.site; font-src 'self' https://beta.leadconnectorhq.com https://*.leadconnectorhq.com; img-src 'self' data: https: https://images.pexels.com https://beta.leadconnectorhq.com https://*.leadconnectorhq.com; frame-ancestors 'self';"

[[headers]]
for = "/*.js"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.woff2"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Access-Control-Allow-Origin = "*"

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.jpg"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.jpeg"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.png"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.gif"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.svg"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.webp"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.ico"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/sitemap.xml"

[headers.values]
Content-Type = "application/xml"
Cache-Control = "public, max-age=3600"
X-Robots-Tag = "noindex"

[[headers]]
for = "/robots.txt"

[headers.values]
Content-Type = "text/plain"
Cache-Control = "public, max-age=86400"