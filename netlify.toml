[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[[forms]]
  name = "quick-quote"

[[forms]]
  name = "contact"

[[forms]]
  name = "commercial-auto-quote"

[[forms]]
  name = "workers-comp-quote"

[[forms]]
  name = "general-liability-quote"

[[forms]]
  name = "bop-quote"

[[forms]]
  name = "personal-lines-quote"

[[forms]]
  name = "claim-report"

[[forms]]
  name = "career-application"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"